<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error {{ error_code }} - Ventas Club</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-card { background: white; border-radius: 20px; padding: 2rem; text-align: center; max-width: 400px; width: 90%; }
    </style>
</head>
<body>
    <div class="error-card">
        <div style="font-size: 3rem; margin-bottom: 0.5rem;">
            {% if error_code == 404 %}
            <i class="bi bi-search text-warning"></i>
            {% else %}
            <i class="bi bi-exclamation-triangle text-danger"></i>
            {% endif %}
        </div>
        <h2 class="fw-bold">Error {{ error_code }}</h2>
        <p class="text-muted">{{ error_msg }}</p>
        <div class="d-flex gap-2 justify-content-center mt-3">
            <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm" style="border-radius: 10px;">
                <i class="bi bi-arrow-left"></i> Volver
            </a>
            <a href="/" class="btn btn-primary btn-sm" style="border-radius: 10px;">
                <i class="bi bi-house"></i> Inicio
            </a>
        </div>
    </div>
</body>
</html>
